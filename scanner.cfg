# Cartographer v4 — eddy-current scanning probe.
# Acts as both Z probe and bed surface scanner. Provides:
#   - probe:z_virtual_endstop for Z homing (replaces stepper_z's PG10 placeholder)
#   - BED_MESH_CALIBRATE backend
#   - PROBE_ACCURACY / TOUCH_CALIBRATE diagnostics
#
# x_offset / y_offset are the physical offsets from the nozzle to the probe
# coil center. Start at 0,0 — calibrate exact values after touch calibration.

[scanner]
mcu: scanner
sensor: cartographer
sensor_alt: carto
x_offset: 0
y_offset: 0
backlash_comp: 0.5
scanner_touch_z_offset: 0.05
mode: touch
probe_speed: 5
lift_speed: 5
samples: 5
samples_tolerance: 0.025
samples_tolerance_retries: 4
samples_result: median

# safe_z_home: required when using a probe-based Z endstop.
# Tells Klipper to move to a known XY position before doing Z homing,
# so the probe is over the bed (not over an open area).

[safe_z_home]
home_xy_position: 175, 175       # center of 350x350 bed
speed: 100
z_hop: 10
z_hop_speed: 10
