# R3men 1000 W graphite AC-mains heated bed, switched via SSR on HE1.
# Thermistor: NTC 100K MGB18-104F39050L32 on TB.
# Magnetic pad rated to 130 °C — capping max_temp at 120 for headroom.
#
# Control: PID (autosave-managed in printer.cfg). The PID values are
# calculated by PID_CALIBRATE HEATER=heater_bed TARGET=70 and persisted
# by SAVE_CONFIG into the autosave block at the bottom of printer.cfg.
# Static values are intentionally not set here — Klipper requires one
# source of truth and the autosave block is it.
#
# max_power capped at 0.6 (600 W of the 1000 W) for smoother heating
# curves and reduced thermal stress on the bed and SSR.

[heater_bed]
heater_pin: PA3
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PF3
max_power: 0.6
min_temp: 0
max_temp: 120
