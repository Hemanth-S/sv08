# =============================================================================
# Chamber / front LED strip on HE2
# =============================================================================
# 24 V LED strip wired to the HE2 connector on the Octopus Pro v1.1 (PB10).
# PWM-controlled MOSFET output — supports dimming.
#
# Control from console / macros:
#   SET_PIN PIN=chamber_lights VALUE=1.0    # full brightness
#   SET_PIN PIN=chamber_lights VALUE=0.5    # half
#   SET_PIN PIN=chamber_lights VALUE=0      # off

# ---------------------------------------------------------------------------
# DISABLED — HE2 MOSFET on the new Octopus Pro v1.1 is not switching.
# Bed/HE1 works after pin fix, but HE2 stays dead regardless of commanded
# state. Pending: verify LED wires are on HE2 terminals (not HE3); HE0 swap
# test if needed. Re-enable this block once HE2 is fixed.
# ---------------------------------------------------------------------------
# [output_pin chamber_lights]
# pin: PB10
# pwm: True
# hardware_pwm: False
# cycle_time: 0.010                # 100 Hz PWM
# value: 0                          # off at boot
# shutdown_value: 0                 # off if Klipper shuts down (safety)
