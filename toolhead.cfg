# =============================================================================
# Toolhead components on the Nitehawk-36 (RP2040)
# =============================================================================
# Per the LDO Nitehawk-36 documentation and visual inspection:
#   gpio6  — Part cooling fans (dual 3010s)
#   gpio5  — Hotend cooling fan (HEC) — configured in extruder.cfg
#   gpio16 — Hotend fan tachometer — configured in extruder.cfg
#   gpio7  — RGB LED strip (Stealthburner-style toolhead lighting)
#   gpio3  — Top filament sensor (pre-extruder gear)
#   gpio13 — Bottom filament sensor (X Endstop port, repurposed)
#   gpio29 — Hotend thermistor (now in extruder.cfg)
#   gpio10 — unconnected, available

# -------- Part cooling fan (M106/M107 controlled, dual 3010s in parallel) --------
[fan]
pin: nitehawk:gpio6
max_power: 1.0
shutdown_speed: 0
cycle_time: 0.010
hardware_pwm: false
kick_start_time: 0.5
off_below: 0.10

# -------- Filament sensors (LDO Jabberwocky dual sensor array) --------
# "Top" sensor: pre-extruder (filament loaded into extruder gears)
[filament_switch_sensor top_filament]
switch_pin: ^!nitehawk:gpio3
pause_on_runout: True
runout_gcode:
  M118 Top filament sensor: runout detected

# "Bottom" sensor: post-extruder (filament past extruder, before hotend)
# Bottom filament sensor (post-extruder): re-enabled after correcting the
# extruder dir_pin mismap. gpio13 is the X Endstop port (per LDO Nitehawk-36
# docs), unused on this build because X homing uses sensorless StallGuard on
# the Octopus side. Switch input, electrically the same as gpio3.
[filament_switch_sensor bottom_filament]
switch_pin: ^!nitehawk:gpio13
pause_on_runout: True
runout_gcode:
  M118 Bottom filament sensor: runout detected

# -------- Toolhead RGB LED (Stealthburner-style WS2812B) --------
# Assuming 3 LEDs total (1 logo + 2 nozzle) — common Stealthburner config.
# If Jabberwocky has a different LED count, adjust chain_count after first boot.
[neopixel toolhead_leds]
pin: nitehawk:gpio7
chain_count: 3
color_order: GRB
initial_RED: 0.3
initial_GREEN: 0.3
initial_BLUE: 0.3
