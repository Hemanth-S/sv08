# =============================================================================
# Custom macros
# =============================================================================

[gcode_macro QGL]
description: Quad Gantry Level — always two-pass (coarse then fine) with safety checks.
             The coarse pass at 15mm provides safe clearance even if the gantry is
             significantly off-level. The fine pass at 2mm only runs after coarse
             has converged within 0.05mm, so the closer probing is safe.
gcode:
    # ---- Pre-flight: ensure all axes are homed ----
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}
    {% if "z" not in printer.toolhead.homed_axes %}
        G28 Z
    {% endif %}

    # ---- Move to safe Z before any QGL motion ----
    # 15mm clears the bed regardless of any current corner offset.
    G90
    G1 Z15 F1500

    # ---- Coarse pass: 15mm probe height, 0.05mm tolerance ----
    # Safe even with severely tilted gantry. Klipper retries until all 4 corners
    # agree within 0.05mm before this command returns.
    QUAD_GANTRY_LEVEL HORIZONTAL_MOVE_Z=15 RETRY_TOLERANCE=0.05

    # ---- Fine pass: 2mm probe height, 0.0075mm tolerance ----
    # After coarse converged, gantry is within 0.05mm of level — 2mm probe
    # height has 1.95mm minimum clearance, plenty for a precision second pass.
    QUAD_GANTRY_LEVEL HORIZONTAL_MOVE_Z=2 RETRY_TOLERANCE=0.0075

    # ---- Park at safe height ----
    G1 Z10 F1500
    M118 QGL complete (coarse + fine, gantry within 0.0075mm)
