# SV08 Klipper Configuration
#
# Architecture:
#   Pi 5 (MainsailOS) ── USB ──> Octopus Pro v1.1            (motion + bed)
#                     └─ USB ──> Toolhead USB hub
#                                 ├─> Nitehawk-36            (extruder / hotend / fans / sensors / cutter)
#                                 └─> Cartographer v4        (eddy-current Z probe)
#
# Hardware spec & open questions: see the Sovol SV08 vault note.
#
# Stage 1 (this commit): MCUs + [printer] + steppers + TMC drivers.
#   Goal: Klipper service starts cleanly, all 3 MCUs report connected,
#   motors can be enabled/jogged manually. No homing, no heaters, no extruder yet.

[include mcu.cfg]
[include steppers.cfg]
[include mainsail.cfg]
[include probes.cfg]
[include heater_bed.cfg]
[include cartographer.cfg]
[include fans.cfg]
[include lights.cfg]
[include toolhead.cfg]
[include extruder.cfg]
[include macros.cfg]

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 15
max_z_accel: 100
square_corner_velocity: 5.0

[force_move]
enable_force_move: True

