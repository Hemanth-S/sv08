# =============================================================================
# Cartographer v4 (NEW plugin: cartographer3d-plugin)
# =============================================================================
# Eddy-current scanning probe for Z homing, bed mesh, and (optionally) input
# shaper resonance testing via the onboard ADXL345.
#
# Plugin: cartographer3d-plugin (installed via the curl install script).
# Docs:   https://docs.cartographer3d.com/cartographer-probe/installation-and-setup/software-configuration/klipper-setup

[mcu cartographer]
serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_43003A000550315551333620-if00
restart_method: command

[cartographer]
mcu: cartographer
x_offset: 0                    # offset from nozzle to coil center; calibrate after install
y_offset: 0
verbose: no

[bed_mesh]
zero_reference_position: 175, 175    # bed center for 350x350 bed
speed: 300
horizontal_move_z: 3
mesh_min: 30, 30
mesh_max: 320, 320
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 0, 0

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

# ---- Cartographer's onboard ADXL345 (used for input shaper later, Stage 6) ----
# Cartographer V4 uses cs_pin: cartographer:PA0

[adxl345]
cs_pin: cartographer:PA0
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
    175, 175, 20      # bed center, 20mm above bed

# ---- safe_z_home: required for probe-based Z endstop ----
[safe_z_home]
home_xy_position: 175, 175
speed: 100
z_hop: 10
z_hop_speed: 10

# =============================================================================
# Quad Gantry Level — used to level the gantry across the four Z corners
# =============================================================================
# Standard Voron 2.4 350 / SV08 geometry. The 4 leadscrews are at the corners
# of the gantry frame, slightly outside the bed area.
#
# Each [points] entry is a probe point near (but not directly over) a leadscrew.
# Probe takes a Z reading at each, then Klipper adjusts the four Z motors
# independently to bring all four corners level.
#
# The QGL macro (in macros.cfg) calls QUAD_GANTRY_LEVEL twice with different
# HORIZONTAL_MOVE_Z values for coarse-then-fine, so the values below are
# defaults — the macro overrides them per-pass.

[quad_gantry_level]
gantry_corners:
    -60, -10
    410, 420
points:
    50, 25
    50, 275
    300, 275
    300, 25
speed: 200
horizontal_move_z: 5
retries: 5
retry_tolerance: 0.0075
max_adjust: 10
