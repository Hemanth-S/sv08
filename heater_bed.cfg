# R3men 1000 W graphite AC-mains heated bed, switched via SSR on HE1.
# Thermistor: NTC 100K MGB18-104F39050L32 on TB.
# Magnetic pad rated to 130 °C — capping max_temp at 120 for headroom.
#
# Watermark (bang-bang) control rather than PID for an SSR-switched AC bed.
# SSRs have switching latency that makes PID's fast modulation pointless,
# and watermark is gentler on the SSR. Can revisit after PID tuning if
# needed.
#
# max_power capped at 0.6 (600 W of the 1000 W) for smoother heating curves
# and reduced thermal stress on the bed and SSR. Bump up to 1.0 later if
# heat-up time is an issue.

[heater_bed]
heater_pin: PA1
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PF3
max_power: 0.6
min_temp: 0
max_temp: 120
control: watermark
max_delta: 2.0
