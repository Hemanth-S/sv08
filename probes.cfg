# Auxiliary temperature sensors (chamber, etc.). The hotend thermistor moved
# to [extruder] in Stage 4 — both can't share nitehawk:gpio29.

[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: PF4               # ← REPLACE with PF4 (T0), PF5 (T1), PF6 (T2), or PF7 (T3) depending on silkscreen
min_temp: -50
max_temp: 100
