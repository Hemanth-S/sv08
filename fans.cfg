# =============================================================================
# Driver-cooling fans (Ramalama2 Octopus_Pro_FanCase mod)
# =============================================================================
# Two Noctua NF-A4x10 12V PWM fans on top of the stepper drivers,
# connected to FAN1 on the Octopus Pro v1.1 (via a TinyFan PWM controller
# that handles 24V→12V buck conversion and proper PWM signalling for the
# Noctuas).
#
# controller_fan rather than heater_fan: drivers heat from stepping, not
# from a heater. Fan turns on whenever any stepper is active and stays on
# for the idle_timeout to cool down after motion stops.

[controller_fan stepper_drivers_fan]
pin: PE5
max_power: 1.0
kick_start_time: 0.5
fan_speed: 0.6
idle_timeout: 60
heater: heater_bed
