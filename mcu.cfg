# MCU connections — all three boards reach the Pi over USB.

[mcu]
# Octopus Pro v1.1  —  STM32H723. Handles X/Y/Z motion + bed heater (HE1/SSR).
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_320020001151313531383332-if00

[mcu nitehawk]
# Nitehawk-36  —  RP2040. Toolhead board: extruder, hotend, fans, filament sensors,
# filament cutter servo. Reaches the Pi via the toolhead USB hub.
serial: /dev/serial/by-id/usb-Klipper_rp2040_303339383405A682-if00

# [mcu scanner]
# Cartographer v4 — STM32G431. Eddy-current scanning probe for Z homing & bed mesh.
# Disabled until Stage 3 — Cartographer firmware requires the cartographer-klipper
# klippy_extras plugin to be installed on the Pi before it can complete the Klipper
# protocol handshake. Re-enable when we add the [scanner] block.
# serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_43003A000550315551333620-if00
