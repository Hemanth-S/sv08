# =============================================================================
# Extruder — Phaetus Conch hotend + Bondtech compound + LDO Orbiter
# =============================================================================
# Mounted on the LDO Jabberwocky toolhead; driven by the Nitehawk-36.
#
# IMPORTANT — pin assignments need verification against the LDO Nitehawk-36 docs:
#   https://docs.ldomotors.com/en/Toolboard/nitehawk-36
# If Klipper rejects any pin on RESTART, check the docs and adjust.
#
# rotation_distance is the LDO Jabberwocky default (~4.637 for Bondtech LGX-style
# gears). MUST be calibrated with EXTRUSION_TEST before printing — assume off by
# 5-15% out of the box.
#
# max_temp is conservative at 280 °C for the NTC variant of the Conch. PT1000
# variants can go to 450 °C, but you have NTC.

[extruder]
step_pin: nitehawk:gpio14
dir_pin: nitehawk:gpio13
enable_pin: !nitehawk:gpio15
microsteps: 32
rotation_distance: 4.637
nozzle_diameter: 0.4
filament_diameter: 1.75
heater_pin: nitehawk:gpio9
sensor_type: Generic 3950
sensor_pin: nitehawk:gpio29
pullup_resistor: 2200
min_temp: 0
max_temp: 280
min_extrude_temp: 170
control: pid
pid_Kp: 30.0
pid_Ki: 5.0
pid_Kd: 100.0
max_extrude_only_distance: 200

[tmc2209 extruder]
uart_pin: nitehawk:gpio8
run_current: 0.5
stealthchop_threshold: 999999

# ---- Hotend cooling fan (HEC connector — auto-on when extruder hot) ----
[heater_fan hotend_fan]
pin: nitehawk:gpio5
tachometer_pin: ^nitehawk:gpio16
tachometer_poll_interval: 0.001
heater: extruder
heater_temp: 50.0
fan_speed: 1.0
