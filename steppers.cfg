# Steppers + TMC2209 drivers on the Octopus Pro v1.1 (STM32H723).
#
# Wiring (per the vault note):
#   MOTOR0 -> X        MOTOR4 -> Z2
#   MOTOR1 -> Y        MOTOR5 -> Z3
#   MOTOR2 -> Z1       MOTOR6 -> Z4
#   MOTOR3 -> empty (skipped to match the carried-over wiring)
#
# Endstops:
#   X — sensorless via TMC2209 StallGuard on MOTOR0 DIAG pin (PG6).
#   Y — hall-effect endstop on Y-STOP (PG9).
#   Z — Cartographer (configured in Stage 3); placeholder pin used here so the
#       config compiles. *Do not run Z homing yet.*
#
# Rotation distances are stock SV08 / Voron 2.4 starting values:
#   X / Y: 16T pulley + GT2 belt = 40 mm/rev
#   Z:     TR8x8 leadscrew      = 8 mm/rev
# Tune after motion is verified.
#
# TMC2209 run currents start conservative at 0.8 A. Bump up after first motion test.

# =============================================================================
# X — MOTOR0  (sensorless homing via DIAG)
# =============================================================================
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 0
position_min: 0
position_max: 350
homing_speed: 25
homing_retract_dist: 0          # required for sensorless homing
homing_positive_dir: false

[tmc2209 stepper_x]
uart_pin: PC4
diag_pin: ^PG6
driver_SGTHRS: 100              # placeholder — tune with SET_TMC_FIELD or sensorless-homing tuning
run_current: 0.8
stealthchop_threshold: 0        # disable stealthchop for reliable sensorless homing

# =============================================================================
# Y — MOTOR1  (hall-effect endstop on Y-STOP / PG9)
# =============================================================================
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 32
rotation_distance: 40
endstop_pin: ^PG9
position_endstop: 350
position_min: 0
position_max: 350
homing_speed: 25
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PD11
run_current: 0.8

# =============================================================================
# Z1 — MOTOR2 (primary Z, owns the Cartographer-driven endstop)
# =============================================================================
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
microsteps: 32
rotation_distance: 8
position_endstop: 0              # PLACEHOLDER — required by Klipper while endstop_pin is non-virtual; replaced with probe:z_virtual_endstop in Stage 3
endstop_pin: ^PG10              # PLACEHOLDER (Z-STOP input on Octopus, nothing wired)
                                # Will be replaced with `probe:z_virtual_endstop` in Stage 3.
position_max: 345
position_min: -5
homing_speed: 8

[tmc2209 stepper_z]
uart_pin: PC6
run_current: 0.8

# =============================================================================
# Z2 — MOTOR4
# =============================================================================
[stepper_z1]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
microsteps: 32
rotation_distance: 8

[tmc2209 stepper_z1]
uart_pin: PF2
run_current: 0.8

# =============================================================================
# Z3 — MOTOR5
# =============================================================================
[stepper_z2]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
microsteps: 32
rotation_distance: 8

[tmc2209 stepper_z2]
uart_pin: PE4
run_current: 0.8

# =============================================================================
# Z4 — MOTOR6
# =============================================================================
[stepper_z3]
step_pin: PE2
dir_pin: PE3
enable_pin: !PD4
microsteps: 32
rotation_distance: 8

[tmc2209 stepper_z3]
uart_pin: PE1
run_current: 0.8
