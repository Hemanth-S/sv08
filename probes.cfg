# Diagnostic: read the Nitehawk-36 hotend thermistor to determine PT1000 vs NTC.
# Remove this block once we configure the real [extruder] in Stage 4.

[temperature_sensor hotend_probe]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: nitehawk:gpio29
pullup_resistor: 2200
min_temp: -50
max_temp: 500

[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: PF4               # ← REPLACE with PF4 (T0), PF5 (T1), PF6 (T2), or PF7 (T3) depending on silkscreen
min_temp: -50
max_temp: 100
